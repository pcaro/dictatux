    <!-- Bubble 1 (Cyan Runic Dictation) -->

    <path d="M 100,160 a 20,20 0 0,1 20,-20 h 40 a 20,20 0 0,1 20,20 v 20 a 20,20 0 0,1 -20,20 h -10 l -15,15 v -15 h -15 a 20,20 0 0,1 -20,-20 z" fill="#153326" stroke="#00F5D4" stroke-width="3" />
    <!-- Runic Text Inside Bubble 1 -->
    <circle cx="125" cy="170" r="3" fill="#00F5D4" />
    <line x1="135" y1="170" x2="160" y2="170" stroke="#00F5D4" stroke-width="4" stroke-linecap="round" />
    <line x1="120" y1="185" x2="145" y2="185" stroke="#00F5D4" stroke-width="4" stroke-linecap="round" />
    <circle cx="155" cy="185" r="3" fill="#00F5D4" />

    <!-- Bubble 2 (Purple Glowing Words) -->

    <path d="M 400,300 a 15,15 0 0,1 15,-15 h 30 a 15,15 0 0,1 15,15 v 15 a 15,15 0 0,1 -15,15 h -10 l -10,10 v -10 h -10 a 15,15 0 0,1 -15,-15 z" fill="#1A1525" stroke="#9D4EDD" stroke-width="3" />
    <!-- Runic Text Inside Bubble 2 -->
    <line x1="415" y1="300" x2="445" y2="300" stroke="#9D4EDD" stroke-width="3" stroke-linecap="round" />
    <line x1="415" y1="312" x2="435" y2="312" stroke="#9D4EDD" stroke-width="3" stroke-linecap="round" />

    <!-- Floating Sparkles / Ambient Magic Particles -->

    <circle cx="280" cy="80" r="2.5" fill="#00F5D4" filter="url(#glow)" />
    <circle cx="320" cy="100" r="3" fill="#9D4EDD" />
    <circle cx="180" cy="120" r="1.5" fill="#00F5D4" />
    <circle cx="470" cy="200" r="2.5" fill="#9D4EDD" filter="url(#glow)" />
    <circle cx="380" cy="230" r="2" fill="#00F5D4" />
    <circle cx="130" cy="280" r="3" fill="#00F5D4" filter="url(#glow)" />
    <circle cx="310" cy="400" r="2" fill="#9D4EDD" />
    <circle cx="200" cy="450" r="2.5" fill="#00F5D4" filter="url(#glow)" />

</svg>
