    <ellipse cx="256" cy="310" rx="60" ry="75" fill="#181D20" />
    <ellipse cx="256" cy="320" rx="45" ry="60" fill="#EAEAEA" />

    <!-- Head -->

    <ellipse cx="256" cy="190" rx="45" ry="45" fill="#181D20" />

    <!-- Face Mask -->

    <path d="M 256,195 C 215,195 210,175 210,160 C 210,145 230,140 256,150 C 282,140 302,145 302,160 C 302,175 297,195 256,195 Z" fill="#EAEAEA" />

    <!-- Beak -->

    <path d="M 240,185 Q 256,170 272,185 Q 256,220 240,185 Z" fill="#FFCA3A" />

    <!-- Eyes (Glowing Cyan) -->

    <ellipse cx="238" cy="165" rx="5" ry="8" fill="#00F5D4" filter="url(#glow)" />
    <ellipse cx="274" cy="165" rx="5" ry="8" fill="#00F5D4" filter="url(#glow)" />

    <!-- Angry / Mystical Druid Brows -->

    <path d="M 225,155 Q 240,152 250,162" fill="none" stroke="#181D20" stroke-width="3" stroke-linecap="round" />
    <path d="M 287,155 Q 272,152 262,162" fill="none" stroke="#181D20" stroke-width="3" stroke-linecap="round" />

    <!-- Robe Opening Trim (Magical Cyan Glow) -->

    <path d="M 256,90 C 200,120 170,180 170,250 C 170,320 200,380 256,430 C 312,380 342,320 342,250 C 342,180 312,120 256,90 Z" fill="none" stroke="#00F5D4" stroke-width="3" opacity="0.8" />

    <!-- Secondary Dashed Trim for mystical runes effect -->

    <path d="M 256,98 C 206,126 178,183 178,250 C 178,317 206,374 256,422 C 306,374 334,317 334,250 C 334,183 306,126 256,98 Z" fill="none" stroke="#00F5D4" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.5" />

