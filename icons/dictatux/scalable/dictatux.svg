<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Background Gradient -->
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#1B4332" stop-opacity="0.6"/>
            <stop offset="60%" stop-color="#0B120E" stop-opacity="1"/>
            <stop offset="100%" stop-color="#0B120E" stop-opacity="1"/>
        </radialGradient>

        code
        Code
        download
        content_copy
        expand_less
        <!-- Magical Cyan Aura -->
        <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00F5D4" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#00F5D4" stop-opacity="0"/>
        </radialGradient>

        <!-- Magic Ribbon Gradient (Cyan to Purple) -->
        <linearGradient id="magicStream" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00F5D4" />
            <stop offset="100%" stop-color="#9D4EDD" />
        </linearGradient>

        <!-- Glow Filter -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- App Icon Base Background -->

    <rect width="512" height="512" rx="112" fill="#0B120E" />
    <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

    <!-- Mystical Floor Shadow -->

    <ellipse cx="256" cy="450" rx="150" ry="15" fill="#050806" />
    <ellipse cx="382" cy="450" rx="25" ry="5" fill="#050806" />

    <!-- Outer Druid Cowl / Robes -->

    <path d="M 256,40 C 230,60 210,90 200,120 C 160,130 110,170 100,240 C 90,310 100,380 90,450 L 422,450 C 412,380 422,310 412,240 C 402,170 352,130 312,120 C 302,90 282,60 256,40 Z" fill="#153326" />

    <!-- Deep Inner Robe Shadow (Housing Tux) -->

    <path d="M 256,90 C 200,120 170,180 170,250 C 170,320 200,380 256,430 C 312,380 342,320 342,250 C 342,180 312,120 256,90 Z" fill="#0A1410" />

    <!-- TUX PENGUIN BASE -->

    <!-- Feet -->

    <path d="M 235,420 C 210,420 190,435 190,445 C 190,450 245,450 250,430 Z" fill="#FF9F1C" />
    <path d="M 277,420 C 302,420 322,435 322,445 C 322,450 267,450 262,430 Z" fill="#FF9F1C" />

