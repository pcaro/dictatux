    <line x1="382" y1="45" x2="382" y2="105" stroke="#707A82" stroke-width="4" />
    <line x1="364" y1="65" x2="400" y2="65" stroke="#707A82" stroke-width="4" />
    <line x1="364" y1="85" x2="400" y2="85" stroke="#707A82" stroke-width="4" />

    <!-- Glowing Mic Crystal / Source -->

    <rect x="368" y="49" width="12" height="12" rx="6" fill="#00F5D4" filter="url(#glow)" />
    <rect x="384" y="49" width="12" height="12" rx="6" fill="#00F5D4" filter="url(#glow)" />

    <!-- Right Sleeve (Emerging from robe) -->

    <path d="M 330,240 C 370,260 410,300 420,330 L 360,350 C 350,320 330,280 310,260 Z" fill="#1B4332" />
    <path d="M 420,330 L 360,350" stroke="#00F5D4" stroke-width="2" opacity="0.5" />

    <!-- Right Flipper (Holding Staff) -->

    <path d="M 360,325 C 380,315 400,315 400,335 C 400,355 380,355 360,345 Z" fill="#181D20" />

    <!-- SPELL MAGIC & SOUNDWAVES -->

    <!-- Ambient Voice Soundwaves near Beak -->

    <path d="M 285,185 A 20,20 0 0,1 285,215" fill="none" stroke="#00F5D4" stroke-width="2" stroke-linecap="round" filter="url(#glow)" />
    <path d="M 295,175 A 35,35 0 0,1 295,225" fill="none" stroke="#00F5D4" stroke-width="2" stroke-linecap="round" opacity="0.6" />

    <!-- Magical Data Stream Ribbon 1 (Cyan Runic Code) -->

    <path d="M 382,75 C 300,-20 150,80 160,140" fill="none" stroke="#00F5D4" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 10 20 10 5 10 30 10" filter="url(#glow)" />

    <!-- Magical Data Stream Ribbon 2 (Purple Flowing Waves) -->

    <path d="M 382,75 C 500,150 480,250 445,285" fill="none" stroke="#9D4EDD" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 15 10 15 25 15 8 15" filter="url(#glow)" />

