    <!-- Leather Straps -->

    <path d="M 376,260 L 388,270 L 388,280 L 376,270 Z" fill="#523B2D" />
    <path d="M 376,275 L 388,285 L 388,295 L 376,285 Z" fill="#523B2D" />
    <path d="M 376,290 L 388,300 L 388,310 L 376,300 Z" fill="#523B2D" />

    <!-- Staff Magic Binding Spiral -->

    <path d="M 365,250 C 350,230 400,210 390,190 C 380,170 350,150 365,130" fill="none" stroke="#00F5D4" stroke-width="2" stroke-dasharray="4 4" opacity="0.8" />

    <!-- Mic Mount Base -->

    <path d="M 382,140 L 382,120" stroke="#707A82" stroke-width="6" />
    <path d="M 360,95 C 360,130 404,130 404,95" fill="none" stroke="#707A82" stroke-width="6" stroke-linecap="round" />
    <circle cx="360" cy="95" r="4" fill="#A0AAB2" />
    <circle cx="404" cy="95" r="4" fill="#A0AAB2" />

    <!-- Vintage Mic Pill -->

